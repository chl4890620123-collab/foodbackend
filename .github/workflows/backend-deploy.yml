name: Backend CI-CD

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/temp_deploy" # 임시 폴더로 안전하게 전송
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 기존 프로세스 종료
            sudo fuser -k 8080/tcp || true
            sleep 2
            
            # 2. 폴더 생성
            mkdir -p /home/ec2-user/backend
            
            # 3. [핵심] 파일 찾기 및 이동 (어디 있든 backend/current.jar로 집합)
            # 임시 폴더나 홈 폴더에 있는 모든 jar를 찾아서 이동시킵니다.
            find /home/ec2-user -name "*.jar" -exec mv {} /home/ec2-user/backend/current.jar \;
            
            # 4. 권한 설정
            sudo chmod 711 /home/ec2-user
            sudo chmod -R 755 /home/ec2-user/hanspoon
            chmod 755 /home/ec2-user/backend/current.jar
            
            # 5. 백엔드 실행
            nohup java -jar /home/ec2-user/backend/current.jar \
              --spring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul" \
              --spring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              --spring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              --JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --OAUTH_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}" \
              --OAUTH_GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}" \
              --OAUTH_KAKAO_CLIENT_ID="${{ secrets.OAUTH_KAKAO_CLIENT_ID }}" \
              --OAUTH_KAKAO_CLIENT_SECRET="${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}" \
              --KAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}" \
              --PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}" \
              --PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}" \
              > /home/ec2-user/backend/app.log 2>&1 &
            
            # 6. 뒷정리
            rm -rf /home/ec2-user/temp_deploy
