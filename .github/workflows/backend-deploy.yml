name: Backend CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      # [중요] 'backend/' 경로를 제거했습니다. 루트에 gradlew가 있다고 가정합니다.
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 빌드 경로에서도 backend/ 를 뺐습니다.
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend
            sudo fuser -k 8080/tcp || true
            sleep 3
            mv *.jar current.jar || true
            
            nohup java -Xmx512M \
              -Dspring.profiles.active=dev \
              -Dspring.web.resources.static-locations="file:/var/www/hanspoon/" \
              -Dspring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:3306/hanspoon?serverTimezone=Asia/Seoul&useSSL=true&trustServerCertificate=true" \
              -Dspring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              -Dspring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              -DJWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -Dfile.upload-dir="/home/ec2-user/hanspoon_images/" \
              -jar current.jar > app.log 2>&1 &
