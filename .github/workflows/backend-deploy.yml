name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 # [수정] Java 21 버전으로 변경
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 1. JAR 파일을 EC2 임시 폴더로 전송
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend_temp"
          strip_components: 2

      # 2. 기존 프로세스 종료 및 RDS/보안 키 설정 주입 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 배포 폴더 준비
            mkdir -p /home/ec2-user/backend
            
            # 8080 포트 사용 중인 기존 프로세스 강제 종료 (fuser 방식)
            sudo fuser -k 8080/tcp || true
            sleep 5
            
            # 기존 파일 삭제 및 신규 파일 교체 (current.jar로 이름 고정)
            rm -f /home/ec2-user/backend/current.jar
            mv /home/ec2-user/backend_temp/*.jar /home/ec2-user/backend/current.jar
            
            # [최우선 실행] Java 21 기반 RDS 및 모든 환경 변수 주입
            nohup java -jar /home/ec2-user/backend/current.jar \
              --spring.datasource.url=jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul \
              --spring.datasource.username=${{ secrets.RDS_USERNAME }} \
              --spring.datasource.password=${{ secrets.RDS_PASSWORD }} \
              --kakao.rest-api-key=${{ secrets.KAKAO_REST_API_KEY }} \
              --jwt.secret=${{ secrets.JWT_SECRET }} \
              > /home/ec2-user/backend/app.log 2>&1 &
            
            # 임시 폴더 정리
            rm -rf /home/ec2-user/backend_temp
            echo "백엔드 배포 완료: JDK 21 환경에서 RDS가 연결되었습니다."
