# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Backend CI/CD

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # 빌드가 확실히 수행되도록 assemble 명령어를 추가하고, 결과물을 확인합니다.
        run: |
          ./gradlew clean assemble
          echo "빌드 완료! 생성된 파일 목록:"
          ls -l build/libs/

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 특정 이름을 지정하지 않고 build/libs 안의 모든 jar를 대상으로 시도
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend_temp"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo fuser -k 8080/tcp || true
            sleep 3
            
            mkdir -p /home/ec2-user/backend
            rm -f /home/ec2-user/backend/current.jar
            
            # 전송된 파일 중 plain이 아닌 실행 파일을 찾아 이름을 바꿉니다.
            find /home/ec2-user/backend_temp -name "*.jar" ! -name "*plain*" -exec mv {} /home/ec2-user/backend/current.jar \;
            chmod +x /home/ec2-user/backend/current.jar
            
            sudo chmod 711 /home/ec2-user
            sudo chmod -R 755 /home/ec2-user/hanspoon || true
            
            nohup java -jar /home/ec2-user/backend/current.jar \
              --spring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul" \
              --spring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              --spring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              --OAUTH_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}" \
              --OAUTH_GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}" \
              --OAUTH_KAKAO_CLIENT_ID="${{ secrets.OAUTH_KAKAO_CLIENT_ID }}" \
              --OAUTH_KAKAO_CLIENT_SECRET="${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}" \
              --JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --KAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}" \
              --PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}" \
              --PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}" \
              > /home/ec2-user/backend/app.log 2>&1 &
            
            rm -rf /home/ec2-user/backend_temp
