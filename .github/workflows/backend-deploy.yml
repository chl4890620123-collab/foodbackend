# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Backend CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # 수정한 build.gradle을 사용하여 JAR 빌드
        run: ./gradlew clean build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend_temp"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 8080 포트 종료 (서버 psmisc 패키지 사용)
            sudo fuser -k 8080/tcp || true
            sleep 5
            
            mkdir -p /home/ec2-user/backend
            rm -f /home/ec2-user/backend/current.jar
            mv /home/ec2-user/backend_temp/*.jar /home/ec2-user/backend/current.jar
            
            # RDS 및 모든 환경 변수 주입 실행
            nohup java -jar /home/ec2-user/backend/current.jar \
              --spring.datasource.url=jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul \
              --spring.datasource.username=${{ secrets.RDS_USERNAME }} \
              --spring.datasource.password=${{ secrets.RDS_PASSWORD }} \
              --OAUTH_GOOGLE_CLIENT_ID=${{ secrets.OAUTH_GOOGLE_CLIENT_ID }} \
              --OAUTH_GOOGLE_CLIENT_SECRET=${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }} \
              --OAUTH_KAKAO_CLIENT_ID=${{ secrets.OAUTH_KAKAO_CLIENT_ID }} \
              --OAUTH_KAKAO_CLIENT_SECRET=${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }} \
              --JWT_SECRET=${{ secrets.JWT_SECRET }} \
              --KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }} \
              --PORTONE_STORE_ID=${{ secrets.PORTONE_STORE_ID }} \
              --PORTONE_API_SECRET=${{ secrets.PORTONE_API_SECRET }} \
              --PORTONE_CHANNEL_KEY_KAKAO=${{ secrets.PORTONE_CHANNEL_KEY_KAKAO }} \
              --PORTONE_CHANNEL_KEY_TOSS=${{ secrets.PORTONE_CHANNEL_KEY_TOSS }} \
              --PORTONE_CHANNEL_KEY_TOSS_PAYMENTS=${{ secrets.PORTONE_CHANNEL_KEY_TOSS_PAYMENTS }} \
              > /home/ec2-user/backend/app.log 2>&1 &
            
            rm -rf /home/ec2-user/backend_temp
