name: Backend CI-CD

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # 실행 가능한 진짜 JAR(bootJar)만 만들도록 지시합니다.
        run: ./gradlew clean bootJar -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend
            
            # 1. 기존 프로세스 종료 (8080 포트 비우기)
            sudo fuser -k 8080/tcp || true
            sleep 5
            
            # 2. 새로 올라온 hanspoon.jar를 서비스용인 current.jar로 교체
            if [ -f "hanspoon.jar" ]; then
                rm -f current.jar
                mv hanspoon.jar current.jar
            fi
            
            # 3. [핵심] 성공했던 모든 옵션(SSL, Dialect, 메모리제한)을 포함하여 실행
            nohup java -Xmx512M -jar current.jar \
              --spring.profiles.active=prod \
              --spring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul&useSSL=true&trustServerCertificate=true" \
              --spring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              --spring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              --spring.jpa.database-platform="org.hibernate.dialect.MariaDBDialect" \
              --JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --OAUTH_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}" \
              --OAUTH_GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}" \
              --OAUTH_KAKAO_CLIENT_ID="${{ secrets.OAUTH_KAKAO_CLIENT_ID }}" \
              --OAUTH_KAKAO_CLIENT_SECRET="${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}" \
              --KAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}" \
              --PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}" \
              --PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}" \
              > app.log 2>&1 &
