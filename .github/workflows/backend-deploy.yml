name: Backend CI-CD

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend
            
            # 1. 기존 8080 포트 프로세스 확실히 종료
            sudo fuser -k 8080/tcp || true
            sleep 3
            
            # 2. 최신 JAR로 교체
            mv build/libs/*.jar current.jar || mv *.jar current.jar || true
            
            # 3. [중요] application.yml의 변수명과 일치하게 주입
            # 이렇게 해줘야 자바가 localhost:3308로 안 가고 RDS로 갑니다.
            export RDS_HOSTNAME="${{ secrets.RDS_HOSTNAME }}"
            export RDS_PORT="${{ secrets.RDS_PORT }}"
            export RDS_USERNAME="${{ secrets.RDS_USERNAME }}"
            export RDS_PASSWORD="${{ secrets.RDS_PASSWORD }}"
            
            # 4. 필수 환경변수 (JWT, OAuth)
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export OAUTH_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}"
            export OAUTH_GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}"
            export OAUTH_KAKAO_CLIENT_ID="${{ secrets.OAUTH_KAKAO_CLIENT_ID }}"
            export OAUTH_KAKAO_CLIENT_SECRET="${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}"
            export KAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}"
            
            # 5. 포트원 관련
            export PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}"
            export PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}"
            export PORTONE_CHANNEL_KEY_KAKAO="${{ secrets.PORTONE_CHANNEL_KEY_KAKAO }}"
            export PORTONE_CHANNEL_KEY_TOSS="${{ secrets.PORTONE_CHANNEL_KEY_TOSS }}"
            export PORTONE_CHANNEL_KEY_TOSS_PAYMENTS="${{ secrets.PORTONE_CHANNEL_KEY_TOSS_PAYMENTS }}"
            
            # 6. 실행
            nohup java -Xmx512M -jar current.jar > app.log 2>&1 &
