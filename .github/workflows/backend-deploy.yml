name: Backend CI-CD

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # 실행 가능한 JAR만 깔끔하게 만듭니다.
        run: ./gradlew clean bootJar -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend
            
            # 1. 8080 포트에서 돌고 있는 예전 서버 강제 종료
            sudo fuser -k 8080/tcp || true
            sleep 3
            
            # 2. 방금 올린 새 파일을 current.jar로 이름 변경
            mv build/libs/*.jar current.jar || mv *.jar current.jar || true
            
            # 3. [핵심 로직 수정] 줄바꿈 때문에 증발하지 않도록 변수들을 먼저 확실하게 장착시킵니다.
            export SPRING_PROFILES_ACTIVE=prod
            export SPRING_DATASOURCE_URL="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true"
            export SPRING_DATASOURCE_USERNAME="${{ secrets.RDS_USERNAME }}"
            export SPRING_DATASOURCE_PASSWORD="${{ secrets.RDS_PASSWORD }}"
            export SPRING_JPA_DATABASE_PLATFORM="org.hibernate.dialect.MariaDBDialect"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export OAUTH_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}"
            export OAUTH_GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}"
            export OAUTH_KAKAO_CLIENT_ID="${{ secrets.OAUTH_KAKAO_CLIENT_ID }}"
            export OAUTH_KAKAO_CLIENT_SECRET="${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}"
            export KAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}"
            export PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}"
            export PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}"
            
            # 4. 장착된 변수들과 함께 군더더기 없이 서버 실행!
            nohup java -Xmx512M -jar current.jar > app.log 2>&1 &
