name: Backend CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      # 1. 권한 부여: 저장소 루트에 foodbackend 폴더가 있는지 확인이 필요합니다.
      - name: Grant execute permission for gradlew
        run: chmod +x foodbackend/gradlew

      # 2. 빌드 실행: 폴더 안으로 이동하여 실행합니다.
      - name: Build with Gradle
        working-directory: foodbackend
        run: ./gradlew clean bootJar -x test

      # 3. JAR 파일 전송: 생성된 hanspoon.jar를 EC2로 보냅니다.
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "foodbackend/build/libs/hanspoon.jar"
          target: "/home/ec2-user/backend"
          strip_components: 3

      # 4. EC2에서 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend
            sudo fuser -k 8080/tcp || true
            sleep 3
            mv hanspoon.jar current.jar || true
            
            nohup java -Xmx512M \
              -Dspring.profiles.active=dev \
              -Dspring.web.resources.static-locations="file:/var/www/hanspoon/" \
              -Dspring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:3306/hanspoon?serverTimezone=Asia/Seoul&useSSL=true&trustServerCertificate=true" \
              -Dspring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              -Dspring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              -DJWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -Dfile.upload-dir="/home/ec2-user/hanspoon_images/" \
              -jar current.jar > app.log 2>&1 &
