# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Backend CI/CD

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # plain jar 생성을 방지하여 실행 가능한 jar 하나만 생성되도록 함
        run: ./gradlew clean build -x test -PmainClass=com.hanspoon.HanspoonApplication

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # plain이 붙지 않은 실행 가능한 jar 파일만 전송
          source: "build/libs/!(*-plain).jar"
          target: "/home/ec2-user/backend_temp"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 기존 프로세스 종료
            sudo fuser -k 8080/tcp || true
            sleep 3
            
            # 2. 경로 설정 및 파일 이동
            mkdir -p /home/ec2-user/backend
            rm -f /home/ec2-user/backend/current.jar
            
            # temp에 전송된 파일을 backend 폴더로 이동 (이름 변경)
            mv /home/ec2-user/backend_temp/*.jar /home/ec2-user/backend/current.jar
            chmod +x /home/ec2-user/backend/current.jar
            
            # 3. Nginx 권한 설정 (프론트엔드 500 에러 방지용)
            sudo chmod 711 /home/ec2-user
            sudo chmod -R 755 /home/ec2-user/hanspoon || true
            sudo systemctl restart nginx || true
            
            # 4. 애플리케이션 실행
            # URL에 포트번호 3306이 누락되지 않도록 secrets.RDS_PORT 확인 필요
            nohup java -jar /home/ec2-user/backend/current.jar \
              --spring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul" \
              --spring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              --spring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              --OAUTH_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}" \
              --OAUTH_GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}" \
              --OAUTH_KAKAO_CLIENT_ID="${{ secrets.OAUTH_KAKAO_CLIENT_ID }}" \
              --OAUTH_KAKAO_CLIENT_SECRET="${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}" \
              --JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --KAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}" \
              --PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}" \
              --PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}" \
              > /home/ec2-user/backend/app.log 2>&1 &
            
            # 5. 임시 파일 정리
            rm -rf /home/ec2-user/backend_temp
