name: Backend CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew [cite: 2026-03-06]

      - name: Build with Gradle
        working-directory: ./backend [cite: 2026-03-06]
        run: ./gradlew clean bootJar -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/build/libs/*.jar" [cite: 2026-03-07]
          target: "/home/ec2-user/backend"
          strip_components: 3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend
            sudo fuser -k 8080/tcp || true
            sleep 3
            mv *.jar current.jar || true
            
            # RDS_PORT를 명시적으로 3306으로 박아넣어 에러 가능성을 차단했습니다.
            nohup java -Xmx512M \
              -Dspring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:3306/hanspoon?serverTimezone=Asia/Seoul&sslMode=trust" \
              -Dspring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              -Dspring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              -Dfile.upload-dir="/home/ec2-user/hanspoon_images/" \
              -DJWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -jar current.jar > app.log 2>&1 &
