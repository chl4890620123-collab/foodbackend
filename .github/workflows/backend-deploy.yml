name: Backend CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # [필수] 프론트엔드 빌드 (npm run build)
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # [필수] 빌드된 리액트 파일을 백엔드 static 폴더로 복사
      - name: Copy Frontend to Backend
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/* backend/src/main/resources/static/

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      # 프론트가 포함된 통합 JAR 생성 (테스트는 제외하여 속도 향상)
      - name: Build with Gradle
        working-directory: ./backend
        run: ./gradlew clean bootJar -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/build/libs/*.jar"
          target: "/home/ec2-user/backend"
          strip_components: 3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend
            sudo fuser -k 8080/tcp || true
            sleep 3
            mv *.jar current.jar || true
            
            # [특수기호 방어] 모든 시크릿 값에 큰따옴표("")를 붙여 '!' 등의 문자가 깨지지 않게 합니다.
            nohup java -Xmx512M \
              -Dspring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:3306/hanspoon?serverTimezone=Asia/Seoul&useSSL=true&trustServerCertificate=true" \
              -Dspring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              -Dspring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              -DJWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -DKAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}" \
              -DOAUTH_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}" \
              -DOAUTH_GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}" \
              -DOAUTH_KAKAO_CLIENT_ID="${{ secrets.OAUTH_KAKAO_CLIENT_ID }}" \
              -DOAUTH_KAKAO_CLIENT_SECRET="${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}" \
              -DPORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}" \
              -DPORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}" \
              -DPORTONE_CHANNEL_KEY_KAKAO="${{ secrets.PORTONE_CHANNEL_KEY_KAKAO }}" \
              -DPORTONE_CHANNEL_KEY_TOSS="${{ secrets.PORTONE_CHANNEL_KEY_TOSS }}" \
              -DPORTONE_CHANNEL_KEY_TOSS_PAYMENTS="${{ secrets.PORTONE_CHANNEL_KEY_TOSS_PAYMENTS }}" \
              -Dfile.upload-dir="/home/ec2-user/hanspoon_images/" \
              -jar current.jar > app.log 2>&1 &
