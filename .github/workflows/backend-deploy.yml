name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 1. 빌드된 JAR 파일을 EC2로 전송
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/backend"
          strip_components: 2

      # 2. 기존 프로세스 종료 및 새 JAR 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 폴더가 없으면 생성
            mkdir -p /home/ec2-user/backend
            
            # 8080 포트를 사용하는 기존 프로세스 종료
            sudo fuser -k 8080/tcp || true
            
            # 이전 JAR 파일 삭제 (중복 실행 방지)
            rm -f /home/ec2-user/backend/old-*.jar
            mv /home/ec2-user/backend/*.jar /home/ec2-user/backend/current.jar || true
            
            # 새 JAR 파일 실행 (로그는 app.log에 기록)
            nohup java -jar /home/ec2-user/backend/current.jar \
              --spring.datasource.url=jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul \
              --spring.datasource.username=${{ secrets.RDS_USERNAME }} \
              --spring.datasource.password=${{ secrets.RDS_PASSWORD }} \
              --kakao.rest-api-key=${{ secrets.KAKAO_REST_API_KEY }} \
              --jwt.secret=${{ secrets.JWT_SECRET }} \
              > /home/ec2-user/backend/app.log 2>&1 &
