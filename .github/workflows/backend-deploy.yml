name: Backend CI-CD

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # [핵심] 실행 불가능한 plain.jar는 아예 무시하고 전송합니다.
          source: "build/libs/*[!plain].jar"
          target: "/home/ec2-user/backend"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 기존 프로세스 종료
            sudo fuser -k 8080/tcp || true
            sleep 2
            
            # 2. 폴더 정리 (새로 들어온 단 하나의 진짜 jar를 찾음)
            cd /home/ec2-user/backend
            # current가 아닌 새로 온 jar 중 가장 최신 것을 current.jar로 변경
            mv $(ls -t *.jar | grep -v "current" | head -1) current.jar
            
            # 3. 백엔드 실행 (메모리 제한 -Xmx512M 필수!)
            nohup java -Xmx512M -jar current.jar \
              --spring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul" \
              --spring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              --spring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              --JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --OAUTH_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}" \
              --OAUTH_GOOGLE_CLIENT_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}" \
              --OAUTH_KAKAO_CLIENT_ID="${{ secrets.OAUTH_KAKAO_CLIENT_ID }}" \
              --OAUTH_KAKAO_CLIENT_SECRET="${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}" \
              --KAKAO_REST_API_KEY="${{ secrets.KAKAO_REST_API_KEY }}" \
              --PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}" \
              --PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}" \
              > app.log 2>&1 &
