- name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 빌드된 결과물 폴더에서 모든 jar 파일을 선택
          source: "build/libs/*.jar"
          # EC2의 사용자 폴더 바로 아래로 전송 (복잡한 경로 제거)
          target: "/home/ec2-user"
          # 경로 계층을 무시하고 파일만 전송하도록 설정
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존 프로세스 종료
            sudo fuser -k 8080/tcp || true
            sleep 3
            
            # 폴더 생성 및 이동
            mkdir -p /home/ec2-user/backend
            # 전송된 파일을 backend 폴더로 옮기면서 이름 변경
            mv /home/ec2-user/*.jar /home/ec2-user/backend/current.jar
            
            # 권한 부여
            sudo chmod 711 /home/ec2-user
            sudo chmod -R 755 /home/ec2-user/hanspoon
            chmod 755 /home/ec2-user/backend/current.jar
            
            # 백엔드 실행
            nohup java -jar /home/ec2-user/backend/current.jar \
              --spring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:${{ secrets.RDS_PORT }}/hanspoon?serverTimezone=Asia/Seoul" \
              --spring.datasource.username="${{ secrets.RDS_USERNAME }}" \
              --spring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
              --JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              > /home/ec2-user/backend/app.log 2>&1 &
