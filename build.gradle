name: Hanspoon Deploy

on:
  push:
    branches: [ main ] # 메인 브랜치에 푸시될 때 실행

jobs:
  build:
    runs-on: ubuntu-latest # 빌드가 실행되는 환경

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 자바 설치 (JDK 21)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 2. 노드 설치 (리액트 빌드를 위해 필수!)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS 버전 권장

    # 3. Gradle 빌드 실행 (여기서 리액트 빌드와 복사가 자동으로 일어남)
    - name: Build with Gradle
      run: ./gradlew clean bootJar -x test

    # 4. 빌드된 JAR 파일을 EC2로 전송
    - name: Copy JAR to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/libs/hanspoon.jar"
        target: "/home/ec2-user/backend"

    # 5. EC2에서 서버 재시작
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo fuser -k 8080/tcp || true
          nohup java -jar \
            -Dspring.datasource.url="jdbc:mariadb://${{ secrets.RDS_HOSTNAME }}:3306/hanspoon?serverTimezone=Asia/Seoul&sslMode=trust" \
            -Dspring.datasource.username="${{ secrets.RDS_USERNAME }}" \
            -Dspring.datasource.password="${{ secrets.RDS_PASSWORD }}" \
            -Dkakao.rest-api-key="${{ secrets.KAKAO_REST_API_KEY }}" \
            -Djwt.secret="${{ secrets.JWT_SECRET }}" \
            -Dfile.upload-dir="/home/ec2-user/hanspoon_images/" \
            /home/ec2-user/backend/build/libs/hanspoon.jar > /home/ec2-user/backend/nohup.out 2>&1 &
